name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        env:
          YOUTUBE_API_KEY: dummy
          OPENROUTER_API_KEY: dummy
          OPENROUTER_MODEL: openai/gpt-4o-mini
          TELEGRAM_BOT_TOKEN: dummy
          TELEGRAM_CHAT_ID: dummy
          HOST: 0.0.0.0
          PORT: 8000
        run: pytest tests -q

      - name: Notify Telegram on success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="✅ Testes passaram em ${{ github.repository }}%0AWorkflow: ${{ github.workflow }}%0ABranch: ${{ github.ref_name }}%0ACommit: ${{ github.sha }}"

      - name: Notify Telegram on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="❌ Testes falharam em ${{ github.repository }}%0AWorkflow: ${{ github.workflow }}%0ABranch: ${{ github.ref_name }}%0ACommit: ${{ github.sha }}"
